# EKF robot_localization — OpenAMR
# Fuses wheel odometry (/odom/unfiltered) + the IMU Z gyro (/imu/data).
# The MPU6500 IMU has NO valid orientation (null quaternion) and no reliable accel
# (tilted mount ~14deg) -> we use ONLY angular_velocity.z (yaw rate).
# Output: TF odom->base_link + /odometry/filtered (remapped to /odom).
ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    transform_time_offset: 0.2   # dates the TF +0.2s: the lidar scan is ~0.14s ahead of the TF (micro-ROS latency) -> avoids "extrapolation into the future" on the SLAM side
    sensor_timeout: 0.2
    two_d_mode: true              # planar robot: ignore z, roll, pitch
    publish_tf: true
    print_diagnostics: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # --- Wheel odometry: take vx (linear) and vyaw (rotation) ---
    odom0: /odom/unfiltered
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    # --- IMU: take ONLY vyaw (= angular_velocity.z) ---
    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true
